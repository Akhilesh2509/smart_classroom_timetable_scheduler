<!DOCTYPE html>
<html lang="en"> <!-- removed dark -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Timetable Scheduler</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #EDE8F5; /* premium bg */
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CARD */
        .glass-card {
            background: #ffffff;
            border: 1px solid #cbd5e1;
        }

        /* INPUT */
        .input-field {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #111827;
        }

        .input-field:focus {
            outline: none;
            border-color: #7091E6;
            box-shadow: 0 0 0 2px #EDE8F5;
        }

        /* BUTTON */
        .btn-primary {
            background: #7091E6;
        }

        .btn-primary:hover {
            background: #3D52A0;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md p-8 space-y-6 glass-card rounded-2xl shadow-xl fade-in">

        <h1 class="text-3xl font-bold text-center text-gray-800">
            Scheduler AI
        </h1>

        <p class="text-center text-gray-500">
            Sign in to orchestrate your schedule
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="p-4 rounded-lg text-center
            {% if category == 'success' %} bg-green-100 text-green-700 {% endif %}
            {% if category == 'error' %} bg-red-100 text-red-700 {% endif %}
        ">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('main.login') }}" class="space-y-6">

            <div>
                <label class="text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" required
                    class="mt-1 block w-full px-4 py-2.5 rounded-lg input-field">
            </div>

            <div>
                <label class="text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" required
                    class="mt-1 block w-full px-4 py-2.5 rounded-lg input-field">
            </div>

            <button type="submit"
                class="w-full py-3 rounded-lg text-white font-medium btn-primary transition-all duration-300 hover:scale-105">
                Sign In
            </button>

        </form>
    </div>

</body>
</html>
